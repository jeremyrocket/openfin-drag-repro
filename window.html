<!DOCTYPE html>
<html>
<head>
  <title>Window Layout</title>
  <style>
    body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #1a1a2e; }
    #title-bar { height: 30px; background: #16213e; display: flex; align-items: center; padding: 0 10px; color: white; font-size: 12px; -webkit-app-region: drag; }
    #layout-container { flex: 1; }
  </style>
</head>
<body>
  <div id="title-bar">Drag Repro Window</div>
  <div id="layout-container"></div>

  <script>
    async function init() {
      await fin.Platform.Layout.init({ containerId: 'layout-container' });
      console.log('Layout initialized for window:', fin.me.identity.name);
    }
    init().catch(console.error);
  </script>
</body>
</html>
