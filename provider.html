<!DOCTYPE html>
<html>
<head>
  <title>Platform Provider - Drag Repro</title>
</head>
<body>
  <h2>Platform Provider</h2>
  <div id="log" style="font-family: monospace; font-size: 12px; white-space: pre-wrap; margin-top: 20px;"></div>

  <script>
    const log = (msg) => {
      document.getElementById('log').textContent += new Date().toISOString().slice(11, 23) + ' ' + msg + '\n';
      console.log(msg);
    };

    async function init() {
      await fin.Platform.init({});
      log('Platform initialized');

      const platform = await fin.Platform.getCurrent();

      const win1 = await platform.createWindow({
        defaultWidth: 800,
        defaultHeight: 600,
        layout: {
          content: [{
            type: 'row',
            content: [{
              type: 'stack',
              content: [{
                type: 'component',
                componentName: 'view',
                componentState: {
                  url: 'https://www.example.com'
                }
              }]
            }]
          }]
        }
      });
      log('Window 1 created (example.com): ' + win1.identity.name);

      const win2 = await platform.createWindow({
        defaultWidth: 800,
        defaultHeight: 600,
        layout: {
          content: [{
            type: 'row',
            content: [{
              type: 'stack',
              content: [{
                type: 'component',
                componentName: 'view',
                componentState: {
                  url: 'https://www.google.com'
                }
              }]
            }]
          }]
        }
      });
      log('Window 2 created (google.com): ' + win2.identity.name);

      log('Ready — drag the google.com tab onto a split zone of Window 1');
    }

    init().catch(e => log('ERROR: ' + e.message));
  </script>
</body>
</html>
