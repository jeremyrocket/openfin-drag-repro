<!DOCTYPE html>
<html>
<head>
  <title>Platform Provider - Drag Repro</title>
</head>
<body>
  <h2>Platform Provider</h2>
  <button id="create-window">Create Window with View (layout-embedded)</button>
  <button id="create-window-2">Create Second Window</button>
  <div id="log" style="font-family: monospace; font-size: 12px; white-space: pre-wrap; margin-top: 20px;"></div>

  <script>
    const log = (msg) => {
      document.getElementById('log').textContent += new Date().toISOString().slice(11, 23) + ' ' + msg + '\n';
      console.log(msg);
    };

    async function init() {
      await fin.Platform.init({});
      log('Platform initialized');

      // Create the first window with a view embedded in layout
      const platform = await fin.Platform.getCurrent();
      const win1 = await platform.createWindow({
        defaultWidth: 800,
        defaultHeight: 600,
        layout: {
          content: [{
            type: 'row',
            content: [{
              type: 'stack',
              content: [{
                type: 'component',
                componentName: 'view',
                componentState: {
                  url: 'https://www.example.com'
                }
              }]
            }]
          }]
        }
      });
      log('Window 1 created: ' + win1.identity.name);

      // Button: create second window with view in layout
      document.getElementById('create-window').addEventListener('click', async () => {
        const win = await platform.createWindow({
          defaultWidth: 800,
          defaultHeight: 600,
          layout: {
            content: [{
              type: 'row',
              content: [{
                type: 'stack',
                content: [{
                  type: 'component',
                  componentName: 'view',
                  componentState: {
                    url: 'https://www.google.com'
                  }
                }]
              }]
            }]
          }
        });
        log('New window created (layout-embedded view): ' + win.identity.name);
      });

      // Button: create window then add view via createView
      document.getElementById('create-window-2').addEventListener('click', async () => {
        const win = await platform.createWindow({
          defaultWidth: 800,
          defaultHeight: 600,
          layout: {
            content: [{
              type: 'row',
              content: []
            }]
          }
        });
        await platform.createView({
          url: 'https://www.google.com',
          target: win.identity
        }, win.identity);
        log('New window created (createView): ' + win.identity.name);
      });
    }

    init().catch(e => log('ERROR: ' + e.message));
  </script>
</body>
</html>
